<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ריקי תפרקי לי מרכיבים 🐆</title>

<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ריקי תפרקי לי">
<link rel="apple-touch-icon" href="/icon-192.png">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root {
    --cream: #FBF8F4;
    --accent: #fbcfbd;
    --pink: #D4ADA4;
    --blush: #F0E1DD;
    --dark: #1A1A1A;
    --ink-soft: rgba(26,26,26,0.6);
    --white: #ffffff;
    --light: #efefef;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Heebo', system-ui, sans-serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ══ HEADER ══ */
  header {
    background: rgba(251,248,244,0.92);
    border-bottom: 0.8px solid rgba(0,0,0,0.08);
    padding: 16px 20px 20px;
    text-align: center;
  }

  .header-illus-wrap {
    margin-bottom: 0;
  }
  .header-tiger {
    display: block;
    width: 220px;
    height: auto;
    margin: 0 auto;
  }

  .header-title-line {
    font-family: 'Heebo', sans-serif;
    font-weight: 900;
    font-size: clamp(1.6rem, 5.5vw, 2.6rem);
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--dark);
    text-align: center;
    margin-top: 2px;
  }

  .header-second-line {
    font-family: 'Heebo', sans-serif;
    font-weight: 900;
    font-size: clamp(1.6rem, 5.5vw, 2.6rem);
    line-height: 1.1;
    letter-spacing: -0.4px;
    color: var(--dark);
    text-align: center;
    margin-top: 2px;
  }
  .header-second-line .accent {
    background: var(--accent);
    color: var(--dark);
    border-radius: 14px;
    padding: 4px 16px 8px;
    display: inline-block;
  }

  header p {
    margin-top: 8px;
    font-size: 0.93rem;
    font-weight: 400;
    line-height: 1.5;
    color: var(--ink-soft);
    max-width: 280px;
    margin-inline: auto;
  }

  /* ══ WRAP ══ */
  .wrap {
    max-width: 580px;
    margin: 0 auto;
    padding: 28px 20px 64px;
  }

  /* ══ PANEL ══ */
  .panel {
    background: var(--blush);
    border-radius: 22px;
    padding: 22px;
  }

  .tabs {
    display: flex;
    gap: 6px;
    background: var(--light);
    padding: 5px;
    border-radius: 13px;
    margin-bottom: 20px;
  }
  .tab {
    flex: 1;
    border: none;
    background: transparent;
    cursor: pointer;
    padding: 11px;
    border-radius: 9px;
    font-family: 'Heebo', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: -0.15px;
    color: var(--ink-soft);
    transition: .18s;
  }
  .tab.active {
    background: var(--dark);
    color: var(--white);
  }

  .photo-choice { display: flex; gap: 10px; }
  .choice-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    cursor: pointer;
    background: var(--accent);
    color: var(--dark);
    font-family: 'Heebo', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: -0.15px;
    padding: 13px 10px;
    border-radius: 10px;
    transition: .15s;
    border: none;
  }
  .choice-btn:hover { opacity: 0.85; }
  .choice-btn-alt {
    background: var(--light);
    border: none;
  }
  .preview-wrap { margin-top: 14px; text-align: center; }
  #preview { max-width: 100%; max-height: 220px; object-fit: contain; border-radius: 14px; display: block; margin: 0 auto; }
  .change-photo {
    display: inline-block; margin-top: 10px; background: var(--white);
    border: 1.5px solid var(--pink); color: var(--dark); font-family: 'Heebo', sans-serif;
    font-weight: 700; padding: 8px 14px; border-radius: 10px; cursor: pointer; font-size: 0.88rem;
  }

  textarea {
    width: 100%; min-height: 140px; border: 2px solid var(--pink); border-radius: 14px;
    padding: 14px; font-family: 'Heebo', sans-serif; font-size: 1rem; font-weight: 300;
    color: var(--dark); background: var(--white); resize: vertical; line-height: 1.55;
  }
  textarea:focus { outline: none; border-color: var(--dark); }
  textarea::placeholder { color: rgba(26,26,26,0.35); font-weight: 300; }

  .ptype { margin-top: 16px; }
  .ptype label {
    display: block; font-family: 'Heebo', sans-serif; font-weight: 700; font-size: 0.9rem;
    letter-spacing: -0.15px; color: var(--dark); margin-bottom: 7px;
  }
  .ptype label .opt { font-weight: 300; color: var(--ink-soft); }
  .ptype input {
    width: 100%; border: 2px solid var(--pink); border-radius: 12px; padding: 11px 14px;
    font-family: 'Heebo', sans-serif; font-size: 0.97rem; font-weight: 300;
    color: var(--dark); background: var(--white);
  }
  .ptype input:focus { outline: none; border-color: var(--dark); }
  .ptype input::placeholder { color: rgba(26,26,26,0.35); }

  .go {
    width: 100%; margin-top: 18px; border: none; cursor: pointer;
    background: var(--accent); color: var(--dark);
    font-family: 'Heebo', sans-serif; font-weight: 700; font-size: 1rem;
    letter-spacing: -0.15px; padding: 13px 24px; border-radius: 10px; transition: .15s;
  }
  .go:hover { opacity: 0.85; }
  .go:active { transform: translateY(1px); }
  .go:disabled { opacity: .45; cursor: default; }

  .hidden { display: none; }

  .loading { text-align: center; padding: 44px 10px; display: none; }
  .loading.show { display: block; }
  .loading-tiger { width: 90px; height: auto; display: block; margin: 0 auto; animation: bob 1s ease-in-out infinite; }
  @keyframes bob {
    0%,100% { transform: translateY(0) rotate(-4deg); }
    50% { transform: translateY(-14px) rotate(4deg); }
  }
  .loading p {
    margin-top: 16px; font-family: 'Heebo', sans-serif; font-weight: 700;
    font-size: 1.1rem; letter-spacing: -0.32px; color: var(--dark);
  }

  .results { margin-top: 28px; display: none; }

  .verdict { border-radius: 22px; padding: 24px; position: relative; overflow: hidden; }
  .v-great, .v-good { background: var(--accent); color: var(--dark); }
  .v-mixed { background: var(--blush); color: var(--dark); border: 2px solid var(--pink); }
  .v-careful { background: #f5e8e6; color: var(--dark); border: 2px solid #c97070; }
  .verdict .v-label { font-family: 'Heebo', sans-serif; font-weight: 700; font-size: 0.78rem; letter-spacing: .1em; text-transform: uppercase; opacity: 0.6; }
  .verdict h2 { font-family: 'Heebo', sans-serif; font-weight: 700; font-size: clamp(1.35rem,4.5vw,1.8rem); line-height: 1.1; letter-spacing: -0.56px; margin-top: 7px; }
  .verdict-tiger { position: absolute; left: -14px; bottom: -10px; width: 100px; opacity: 0.13; }

  .section-title { font-family: 'Heebo', sans-serif; font-weight: 900; font-size: 1.05rem; letter-spacing: -0.32px; color: var(--dark); margin: 28px 0 12px; display: flex; align-items: center; gap: 8px; }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { display: flex; align-items: center; gap: 7px; background: var(--white); border: 1px solid rgba(26,26,26,0.1); border-radius: 12px; padding: 8px 13px; font-family: 'Heebo', sans-serif; font-weight: 700; font-size: 0.88rem; color: var(--dark); box-shadow: 0px 4px 12px rgba(26,26,26,0.07); }
  .chip .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .dot.good { background: #5fa86e; } .dot.ok { background: #d88b2c; } .dot.avoid { background: #c95757; }
  .chip small { color: var(--ink-soft); font-weight: 300; }

  .ing { background: var(--white); border-radius: 16px; padding: 16px; margin-bottom: 10px; border-right: 5px solid var(--blush); box-shadow: 0px 4px 16px rgba(26,26,26,0.06); }
  .ing.r-star { border-color: #5fa86e; } .ing.r-good { border-color: #84b97f; } .ing.r-neutral { border-color: #d88b2c; } .ing.r-watch { border-color: #c95757; }
  .ing-head { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
  .ing-name { font-family: 'Heebo', sans-serif; font-weight: 700; font-size: 1rem; letter-spacing: -0.16px; color: var(--dark); }
  .ing-name .he { color: var(--ink-soft); font-weight: 300; font-size: 0.88rem; }
  .ing-tag { font-size: 1.2rem; }
  .ing-what { margin-top: 5px; color: var(--ink-soft); font-size: 0.93rem; font-weight: 300; line-height: 1.55; }
  .ing-meta { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; font-size: 0.88rem; }
  .ing-meta span { display: flex; gap: 6px; }
  .ing-meta .k { font-weight: 700; white-space: nowrap; letter-spacing: -0.15px; }
  .ing-meta .good-line .k { color: #5fa86e; } .ing-meta .warn-line .k { color: #c95757; }

  .tip { background: var(--cream); border-radius: 18px; padding: 18px 20px; margin-top: 22px; font-size: 0.95rem; font-weight: 300; line-height: 1.6; border-right: 5px solid var(--accent); }
  .tip b { font-family: 'Heebo', sans-serif; font-weight: 800; font-size: 1rem; letter-spacing: -0.16px; color: var(--dark); display: block; margin-bottom: 5px; }

  .rec { margin-top: 20px; border-radius: 22px; padding: 22px; background: var(--accent); position: relative; overflow: hidden; }
  .rec-label { font-family: 'Heebo', sans-serif; font-weight: 700; font-size: 0.78rem; letter-spacing: .1em; text-transform: uppercase; color: var(--dark); opacity: 0.6; }
  .rec-name { font-family: 'Heebo', sans-serif; font-weight: 900; font-size: 1.3rem; letter-spacing: -0.52px; color: var(--dark); margin-top: 6px; line-height: 1.15; }
  .rec-note { color: var(--dark); font-size: 0.93rem; font-weight: 300; line-height: 1.55; margin-top: 7px; opacity: 0.75; }
  .rec-btn { display: inline-block; margin-top: 15px; background: var(--dark); color: var(--white); text-decoration: none; font-family: 'Heebo', sans-serif; font-weight: 700; font-size: 0.95rem; letter-spacing: -0.15px; padding: 11px 22px; border-radius: 10px; }
  .rec-tiger { position: absolute; left: -14px; bottom: -8px; width: 88px; opacity: 0.15; }

  .again { display: block; width: 100%; margin-top: 24px; border: 2px solid var(--pink); cursor: pointer; background: var(--cream); color: var(--dark); font-family: 'Heebo', sans-serif; font-weight: 700; font-size: 1rem; letter-spacing: -0.15px; padding: 13px; border-radius: 13px; transition: .15s; }
  .again:hover { background: var(--blush); }

  footer { text-align: center; color: var(--ink-soft); font-size: 0.78rem; font-weight: 300; margin-top: 36px; }

  .install-btn{
    display:none;
    margin:8px auto 0;
    border:none;
    cursor:pointer;
    background:transparent;
    color:var(--ink-soft);
    font-family:'Heebo',sans-serif;
    font-size:0.78rem;
    font-weight:400;
    padding:4px 10px;
    border-radius:10px;
    text-decoration:underline;
  }
  .ios-tip{
    display:none;
    max-width:320px;
    margin:8px auto 0;
    background:var(--blush);
    border:1.5px solid var(--pink);
    border-radius:12px;
    padding:10px 14px;
    font-size:0.82rem;
    color:var(--dark);
    text-align:center;
    line-height:1.5;
  }
  .ios-tip b{color:var(--dark);}
</style>
</head>

<script>
const $ = s => document.querySelector(s);
let imageData = null; // {media_type, data}

// ===== register service worker (makes PWA valid, removes install warning) =====
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('/sw.js').catch(()=>{});
  });
}

// ===== PWA install button =====
(function(){
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if(isStandalone) return; // already installed - don't show

  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  let deferredPrompt = null;

  window.addEventListener('beforeinstallprompt', (e)=>{
    e.preventDefault();
    deferredPrompt = e;
    const b = document.getElementById('installBtn');
    if(b) b.style.display = 'block';
  });

  function setup(){
    const btn = document.getElementById('installBtn');
    const tip = document.getElementById('iosTip');
    if(isIOS && tip){ tip.style.display = 'block'; }  // iOS: show instructions
    if(btn){
      btn.onclick = async ()=>{
        if(deferredPrompt){
          deferredPrompt.prompt();
          await deferredPrompt.userChoice;
          deferredPrompt = null;
          btn.style.display = 'none';
        }
      };
    }
  }
  // run now if DOM is ready, otherwise wait
  if(document.readyState === 'loading'){ document.addEventListener('DOMContentLoaded', setup); }
  else { setup(); }
})();

// tabs
document.querySelectorAll('.tab').forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    const tab=t.dataset.tab;
    $('#tab-photo').classList.toggle('hidden', tab!=='photo');
    $('#tab-text').classList.toggle('hidden', tab!=='text');
  };
});

// shared photo handler - used by both camera and gallery inputs
async function handlePhotoFile(f){
  if(!f) return;

  function showPreview(dataUrl, mediaType){
    imageData={media_type:mediaType, data:dataUrl.split(',')[1]};
    $('#preview').src=dataUrl;
    $('#photoChoice').classList.add('hidden');
    $('#previewWrap').classList.remove('hidden');
  }

  // process a Blob/File: resize via canvas to JPEG
  function processBlob(blob){
    const reader=new FileReader();
    reader.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        try{
          const maxDim=1200;
          let w=img.width||img.naturalWidth, h=img.height||img.naturalHeight;
          if(w>maxDim || h>maxDim){
            if(w>h){ h=Math.round(h*maxDim/w); w=maxDim; }
            else { w=Math.round(w*maxDim/h); h=maxDim; }
          }
          const canvas=document.createElement('canvas');
          canvas.width=w; canvas.height=h;
          canvas.getContext('2d').drawImage(img,0,0,w,h);
          const dataUrl=canvas.toDataURL('image/jpeg',0.85);
          if(dataUrl && dataUrl.indexOf('data:image/jpeg')===0){ showPreview(dataUrl,'image/jpeg'); }
          else throw new Error('canvas failed');
        }catch(err){
          const SUPPORTED=['image/jpeg','image/png','image/gif','image/webp'];
          if(SUPPORTED.includes(blob.type)){ showPreview(reader.result, blob.type); }
          else { showErr('לא הצלחתי לעבד את התמונה. נסי לצלם ישירות 🐆'); }
        }
      };
      img.onerror=()=>{
        const SUPPORTED=['image/jpeg','image/png','image/gif','image/webp'];
        if(SUPPORTED.includes(blob.type)){ showPreview(reader.result, blob.type); }
        else { showErr('הדפדפן לא הצליח לפתוח את התמונה. נסי לצלם ישירות 🐆'); }
      };
      img.src=reader.result;
    };
    reader.onerror=()=>{ showErr('לא הצלחתי לטעון את התמונה. נסי שוב 🐆'); };
    reader.readAsDataURL(blob);
  }

  // detect HEIF/HEIC (by type or extension) and convert first
  const name=(f.name||'').toLowerCase();
  const isHeic = /image\/heic|image\/heif/.test(f.type) || /\.heic$|\.heif$/.test(name);

  if(isHeic && typeof heic2any!=='undefined' && !window.__heicFailed){
    try{
      const converted=await heic2any({ blob:f, toType:'image/jpeg', quality:0.85 });
      const blob=Array.isArray(converted)?converted[0]:converted;
      processBlob(blob);
      return;
    }catch(err){
      processBlob(f);
      return;
    }
  }

  processBlob(f);
}

$('#go').onclick = async ()=>{
  $('#err').style.display='none';
  const activeTab=document.querySelector('.tab.active').dataset.tab;
  const text=$('#text').value.trim();
  const ptype=$('#productType').value.trim();
  const ptypeLine = ptype ? `\n\nהמשתמשת ציינה שזהו: ${ptype}. התחשבי בזה בניתוח (ציפיות סבילות עור, ובקטגוריה - אם זה לא אחת מחמש הקטגוריות, סווגי "other").` : '';

  let content;
  if(activeTab==='photo'){
    if(!imageData){ showErr('צלמי או העלי תמונה של רשימת המרכיבים קודם 🐆'); return; }
    content=[
      {type:'image', source:{type:'base64', media_type:imageData.media_type, data:imageData.data}},
      {type:'text', text:'קראי את רשימת המרכיבים מהתמונה ונתחי לפי ההוראות.'+ptypeLine}
    ];
  } else {
    if(!text){ showErr('הדביקי רשימת מרכיבים קודם 🐆'); return; }
    content=[{type:'text', text:'נתחי את הרשימה הבאה:\n\n'+text+ptypeLine}];
  }

  $('#go').disabled=true;
  $('#results').style.display='none';
  $('#loading').classList.add('show');
  startLoadingRotation();

  try{
    let res;
    try{
      res = await fetch("/api/analyze",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ content })
      });
    }catch(networkErr){
      showErr('נראה שיש בעיה זמנית בחיבור. בדקי שיש רשת תקינה ונסי שוב 🐆', true);
      return;
    }

    const raw0 = await res.text();
    let data;
    try{
      data = JSON.parse(raw0);
    }catch(parseErr){
      showErr('אופס, ריקי קצת התעכבה. נסי שוב בעוד רגע 🐆', true);
      return;
    }

    if(!data.content){
      console.error('API response:', data);
      showErr('אופס, ריקי קצת התבלבלה. נסי שוב בעוד רגע 🐆', true);
      return;
    }
    const raw=data.content.filter(b=>b.type==='text').map(b=>b.text).join('').trim();
    let clean=raw.replace(/```json/g,'').replace(/```/g,'').trim();
    // robust: grab the JSON object between the first { and last }
    const first=clean.indexOf('{'), last=clean.lastIndexOf('}');
    if(first>=0 && last>first) clean=clean.slice(first, last+1);
    const parsed=JSON.parse(clean);
    render(parsed);
  }catch(e){
    showErr('אופס, משהו השתבש. נסי שוב 🐆', true);
    console.error(e);
  }finally{
    $('#go').disabled=false;
    $('#loading').classList.remove('show');
    stopLoadingRotation();
  }
};

function showErr(m, showReport=false){
  const e=$('#err');
  $('#errMsg').textContent=m;
  e.style.display='block';
  const btn=$('#errReport');
  if(showReport){
    const text=encodeURIComponent('היי ריקי, נתקלתי בתקלה בסורק המרכיבים:\n' + m);
    btn.onclick=()=>{ window.open('https://wa.me/972505515733?text='+text,'_blank'); };
    btn.style.display='inline-block';
  } else {
    btn.style.display='none';
  }
}

function render(d){
  const r=$('#results');
  if(d.found===false){
    r.innerHTML='<div class="verdict v-mixed"><div class="v-label">הממ</div><h2>ריקי לא הצליחה לזהות רשימת מרכיבים. נסי תמונה ברורה יותר או הדביקי את הרשימה כטקסט.</h2></div>'
      + '<button class="again" id="again">ריקי, תסרקי לי עוד 🐆</button>';
    r.style.display='block'; r.scrollIntoView({behavior:'smooth'});
    $('#again').onclick=resetTool;
    return;
  }

  let html='';
  html+=`<div class="verdict v-${d.verdict}">
    <img class="verdict-tiger" src="${TIGER_URI}" alt="">
    <div class="v-label">השורה התחתונה של ריקי</div>
    <h2>${verdictLabel[d.verdict]||''} · ${esc(d.verdict_text)}</h2>
  </div>`;

  if(d.skin_types?.length){
    html+='<div class="section-title">🧴 למי זה מתאים</div><div class="chips">';
    d.skin_types.forEach(s=>{
      html+=`<div class="chip"><span class="dot ${s.fit}"></span><span>${esc(s.type)} <small>· ${fitLabel[s.fit]||''}${s.note?' · '+esc(s.note):''}</small></span></div>`;
    });
    html+='</div>';
  }

  if(d.ingredients?.length){
    html+='<div class="section-title">🔍 הרכיבים החשובים</div>';
    d.ingredients.forEach(i=>{
      html+=`<div class="ing r-${i.rating}">
        <div class="ing-head">
          <div class="ing-name">${esc(i.name)} ${i.hebrew?`<span class="he">· ${esc(i.hebrew)}</span>`:''}</div>
          <div class="ing-tag">${ratingTag[i.rating]||''}</div>
        </div>
        ${i.what?`<div class="ing-what">${esc(i.what)}</div>`:''}
        <div class="ing-meta">
          ${i.good_for?`<span class="good-line"><span class="k">טוב ל:</span> ${esc(i.good_for)}</span>`:''}
          ${i.caution?`<span class="warn-line"><span class="k">שימי לב:</span> ${esc(i.caution)}</span>`:''}
        </div>
      </div>`;
    });
  }

  if(d.riki_tip){
    html+=`<div class="tip"><b>הטיפ של ריקי 🐆</b><br>${esc(d.riki_tip)}</div>`;
  }

  const pickArr=RIKI_PICKS[d.category];
  const pick=Array.isArray(pickArr)?pickArr[Math.floor(Math.random()*pickArr.length)]:pickArr;
  if(pick){
    html+=`<div class="rec">
      <img class="rec-tiger" src="${TIGER_URI}" alt="">
      <div class="rec-label">🐆 הבחירה של ריקי בקטגוריה</div>
      <div class="rec-name">${esc(pick.name)}</div>
      ${pick.note?`<div class="rec-note">"${esc(pick.note)}"</div>`:''}
      ${pick.link
        ? `<a class="rec-btn" href="${esc(pick.link)}" target="_blank" rel="noopener">לצפייה במוצר ←</a>`
        : `<div class="rec-soon">לינק יתווסף בקרוב</div>`}
    </div>`;
  }

  html+='<button class="again" id="again">ריקי, תסרקי לי עוד 🐆</button>';

  r.innerHTML=html;
  r.style.display='block';
  r.scrollIntoView({behavior:'smooth'});
  $('#again').onclick=resetTool;
}

function resetTool(){
  // clear text + product type
  $('#text').value='';
  $('#productType').value='';
  // clear photo
  imageData=null;
  $('#preview').removeAttribute('src');
  $('#previewWrap').classList.add('hidden');
  $('#photoChoice').classList.remove('hidden');
  $('#file').value='';
  $('#cameraInput').value='';
  // hide results/errors
  $('#results').style.display='none';
  $('#results').innerHTML='';
  $('#err').style.display='none';
  // back to top of the tool
  document.querySelector('.panel').scrollIntoView({behavior:'smooth'});
}

function esc(s){return (s||'').toString().replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
</script>
</body>
